services:
  db:
    image: pgvector/pgvector:pg16
    container_name: clinibrium-db
    environment:
      POSTGRES_DB: clinibrium
      POSTGRES_USER: clinibrium
      POSTGRES_PASSWORD: clinibrium
    ports:
      - "5432:5432"
    volumes:
      - clinibrium_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinibrium -d clinibrium"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  clinibrium_pgdata:
